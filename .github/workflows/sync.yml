name: Daily Sync

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every day
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip the 24 h commit check and always deploy'
        type: boolean
        default: false

# Never run two syncs in parallel; do not cancel an in-progress deploy.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:

  check:
    name: Check for upstream changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Check for recent commits on typst/packages
        id: check
        env:
          FORCE: ${{ inputs.force }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${FORCE}" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          count=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/typst/packages/commits?since=${SINCE}&per_page=1" \
            | jq 'length')

          if [ "${count}" -gt 0 ]; then
            echo "New commits found since ${SINCE}, proceeding with deploy."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits since ${SINCE}, skipping deploy."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Package and Deploy
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    environment: Deploy
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: typst/packages
          # Full history is required so the bundler can derive package timestamps.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable channel
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: bundler

      - name: Build bundler
        run: cargo build --release --manifest-path bundler/Cargo.toml

      - name: Package
        run: bundler/target/release/bundler

      - name: Delete old Bunny Storage files
        env:
          BUNNY_STORAGE_ENDPOINT: ${{ secrets.BUNNY_STORAGE_ENDPOINT }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_API_KEY }}
        run: |
          BASE="${BUNNY_STORAGE_ENDPOINT%/}"

          http_code=$(curl --silent --show-error --globoff \
            --output /tmp/bunny-list.json \
            --write-out "%{http_code}" \
            -H "AccessKey: ${BUNNY_STORAGE_API_KEY}" \
            -H "Accept: application/json" \
            "${BASE}/")

          echo "List response: HTTP ${http_code}"
          echo "Contents:" && cat /tmp/bunny-list.json | jq .
          if [ "${http_code}" != "200" ]; then
            exit 1
          fi

          # Bunny needs a trailing slash to delete directories recursively.
          jq -c '.[]' /tmp/bunny-list.json | while read -r item; do
            name=$(echo "$item" | jq -r '.ObjectName')
            is_dir=$(echo "$item" | jq -r '.IsDirectory')
            if [ "$is_dir" = "true" ]; then path="${name}/"; else path="${name}"; fi
            echo "Deleting (dir=${is_dir}): ${BASE}/${path}"
            curl --fail --show-error --globoff \
              -X DELETE "${BASE}/${path}" \
              -H "AccessKey: ${BUNNY_STORAGE_API_KEY}"
          done

      - name: Upload to Bunny Storage
        env:
          BUNNY_STORAGE_ENDPOINT: ${{ secrets.BUNNY_STORAGE_ENDPOINT }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_API_KEY }}
        run: |
          BASE="${BUNNY_STORAGE_ENDPOINT%/}"
          find dist -type f | while read -r file; do
            remote_path="${file#dist/}"
            curl --fail --silent --show-error --globoff \
              -X PUT "${BASE}/${remote_path}" \
              -H "AccessKey: ${BUNNY_STORAGE_API_KEY}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}"
          done

      - name: Purge Bunny Pull Zone cache
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_PULL_ZONE_ID }}
        run: |
          curl --fail --silent --show-error \
            -X POST "https://api.bunny.net/pullzone/${BUNNY_PULL_ZONE_ID}/purgeCache" \
            -H "AccessKey: ${BUNNY_API_KEY}"
